worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    sendfile on;
    keepalive_timeout 65;

    # Upload de foto do pré-cadastro (STORY-017): app valida foto ≤5 MB; o nginx
    # default (1 MB) rejeitava com 413 antes de chegar no Laravel. Folga p/ overhead
    # do multipart. Mantenha ≥ o limite da aplicação (upload_max_filesize do PHP).
    client_max_body_size 8m;

    # Logs JSON estruturados (ADR-008) — format mínimo para o Cloud Logging parsear
    log_format json_combined escape=json
        '{"timestamp":"$time_iso8601",'
        '"severity":"INFO",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status_code":$status,'
        '"duration_ms":$request_time,'
        '"bytes_sent":$bytes_sent,'
        '"request_id":"$http_x_request_id"}';
    access_log /dev/stdout json_combined;

    server {
        listen 8080;
        root /app/public;
        index index.php;

        # Cloud Run injeta X-Forwarded-For; respeitar o protocolo real
        set_real_ip_from  0.0.0.0/0;
        real_ip_header    X-Forwarded-For;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include       fastcgi_params;
        }

        location ~ /\.ht {
            deny all;
        }
    }
}
