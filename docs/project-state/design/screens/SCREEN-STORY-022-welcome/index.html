<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Protótipo · STORY-022 — Welcome pós-aprovação (WebApp)</title>
<!--
  PROTÓTIPO DE VALIDAÇÃO — NÃO É CÓDIGO DE PRODUÇÃO.
  Tela: /welcome do WebApp Flutter. Primeira tela pós-aprovação.
  Tokens reais do tokens.dart / DDR-001 (WebApp: page off-white, acento por papel).
  Estados/papel/viewport pelos chips do topo. Toggle de tema. Sem rede, sem build.
-->
<style>
  :root{ --b:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  [data-theme="light"]{
    --page:#F7F4EC; --surface:#FFFFFF; --border:#E0DDD3;
    --text:#0F1B2D; --text-muted:#42504A;
    --shadow:0 1px 2px rgba(15,27,45,.04),0 8px 24px rgba(15,27,45,.06);
    --error:#B83A3A; --error-soft:#FBE2E2; --on-sem:#FFFFFF;
    --info:#4A6FA5; --info-soft:#E0E9F5;
    --brand:#00A868;
    /* acento profissional (verde) */
    --prof-cta:#2D5F3F; --prof-link:#2D5F3F; --prof-on:#FFFFFF;
    /* acento contratante (mostarda) */
    --cont-cta:#9A6E25; --cont-link:#6E4E12; --cont-on:#FFFFFF;
  }
  [data-theme="dark"]{
    --page:#0F1411; --surface:#1A2018; --border:#2A322D;
    --text:#ECEDE5; --text-muted:#A8B2A8;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.4);
    --error:#D85A5A; --error-soft:rgba(216,90,90,.16); --on-sem:#0F1411;
    --info:#6A8FCC; --info-soft:rgba(106,143,204,.16);
    --brand:#00A868;
    --prof-cta:#5FA37C; --prof-link:#5FA37C; --prof-on:#0F1411;
    --cont-cta:#D4A95C; --cont-link:#D4A95C; --cont-on:#0F1411;
  }
  /* acento ativo (resolvido por papel via data-role no <body>) */
  [data-role="profissional"]{ --cta:var(--prof-cta); --link:var(--prof-link); --on-cta:var(--prof-on); }
  [data-role="contratante"]{ --cta:var(--cont-cta); --link:var(--cont-link); --on-cta:var(--cont-on); }

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--b);background:var(--page);color:var(--text);line-height:1.5;min-height:100vh}

  /* Barra de protótipo (não faz parte da UI) */
  .proto{position:fixed;top:0;left:0;right:0;z-index:80;background:#0F1B2D;color:#ECEDE5;display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:8px 14px;font-size:12px}
  .proto b{font-size:10px;letter-spacing:1px;text-transform:uppercase;opacity:.6;margin:0 4px 0 10px}
  .proto button{font-family:var(--b);font-size:12px;background:rgba(255,255,255,.08);color:#ECEDE5;border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:5px 11px;cursor:pointer}
  .proto button.on{background:#00A868;color:#fff;border-color:transparent}
  .proto .sp{margin-left:auto}

  .stage{padding-top:54px;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .stage.mobile .frame{width:390px;min-height:760px;border:1px solid var(--border);border-radius:28px;box-shadow:var(--shadow);overflow:hidden;background:var(--page);margin:24px 0}
  .stage.desktop .frame{width:100%;min-height:calc(100vh - 54px);background:var(--page);display:flex;align-items:center;justify-content:center}

  /* conteúdo */
  .wrap{max-width:480px;margin:0 auto;padding:48px 24px;width:100%}
  .stage.desktop .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:48px}
  .stage.desktop .wrap{padding:0}
  .stage.desktop .card .wrap{max-width:480px;padding:0}

  .brand{font-family:'Bebas Neue',var(--b);font-weight:700;font-size:42px;letter-spacing:1px;color:var(--brand);line-height:1}
  .headline{font-size:30px;font-weight:600;letter-spacing:-.4px;color:var(--text);margin-top:28px}
  .lede{font-size:16px;color:var(--text-muted);margin-top:14px}
  .listlabel{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-top:28px}
  ul.bullets{list-style:none;margin-top:12px;display:flex;flex-direction:column;gap:12px}
  ul.bullets li{display:flex;gap:12px;align-items:flex-start;font-size:16px;color:var(--text)}
  ul.bullets li::before{content:"";width:7px;height:7px;border-radius:999px;background:var(--cta);margin-top:9px;flex-shrink:0}

  .cta{width:100%;height:52px;border:none;border-radius:999px;background:var(--cta);color:var(--on-cta);font-size:15px;font-weight:600;cursor:pointer;margin-top:32px;display:flex;align-items:center;justify-content:center;gap:10px}
  .cta:disabled{opacity:.85;cursor:default}
  .spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:var(--on-cta);border-radius:999px;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .later{display:block;width:100%;text-align:center;background:none;border:none;color:var(--text-muted);font-size:14px;font-weight:500;cursor:pointer;padding:14px;margin-top:8px}

  .banner{display:flex;gap:10px;align-items:flex-start;border-radius:12px;padding:13px 16px;margin-top:20px;font-size:14px}
  .banner.err{background:var(--error-soft);border:1px solid color-mix(in srgb,var(--error) 50%,transparent);color:var(--text)}
  .banner.info{background:var(--info-soft);border:1px solid color-mix(in srgb,var(--info) 50%,transparent);color:var(--text)}
  .banner .dot{width:16px;height:16px;border-radius:999px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
  .banner.err .dot{background:var(--error)} .banner.info .dot{background:var(--info)}
  .banner .homelink{display:inline-block;margin-top:8px;color:var(--cta);font-weight:600;text-decoration:none;cursor:pointer}

  .hide{display:none!important}
</style>
</head>
<body data-role="profissional">

<div class="proto">
  <b>Papel</b>
  <button id="r-prof" class="on" onclick="setRole('profissional')">Profissional</button>
  <button id="r-cont" onclick="setRole('contratante')">Contratante</button>
  <b>Estado</b>
  <button id="s-default" class="on" onclick="setState('default')">Padrão</button>
  <button id="s-loading" onclick="setState('loading')">Enviando</button>
  <button id="s-error" onclick="setState('error')">Erro</button>
  <button id="s-active" onclick="setState('active')">Já ativo</button>
  <span class="sp"></span>
  <b>Viewport</b>
  <button id="v-mobile" class="on" onclick="setView('mobile')">Mobile</button>
  <button id="v-desktop" onclick="setView('desktop')">Desktop</button>
  <button onclick="toggleTheme()">Tema</button>
</div>

<div class="stage mobile" id="stage">
  <div class="frame">
   <div class="card">
    <div class="wrap">
      <div class="brand" aria-label="Turni">TURNI.</div>

      <!-- estado welcome (default/loading/error) -->
      <div id="welcome-block">
        <h1 class="headline" id="headline">Bem-vindo(a), Diego!</h1>
        <p class="lede">Tudo certo, seu cadastro foi aprovado. Falta só completar seu perfil — leva uns 5 minutos.</p>
        <div class="listlabel">Vamos pedir:</div>
        <ul class="bullets" id="bullets"></ul>

        <button class="cta" id="cta" onclick="setState('loading')">
          <span id="cta-label">Vamos lá</span>
          <span class="spin hide" id="cta-spin"></span>
        </button>
        <button class="later" id="later">Fazer depois</button>

        <div class="banner err hide" id="banner-err" role="status">
          <span class="dot">!</span>
          <span>Não conseguimos seguir agora. Tentar de novo.</span>
        </div>
      </div>

      <!-- estado já-ativo -->
      <div id="active-block" class="hide">
        <h1 class="headline">Boas-vindas de volta.</h1>
        <div class="banner info" role="status" style="margin-top:24px">
          <span class="dot">i</span>
          <div>
            Você já está com o cadastro completo.
            <a class="homelink" href="#">Ir para a home</a>
          </div>
        </div>
      </div>

    </div>
   </div>
  </div>
</div>

<script>
  const BULLETS = {
    profissional: ['Seu documento (CPF ou CNPJ)', 'Sua chave Pix para receber', 'Uma foto de comprovante'],
    contratante:  ['O CNPJ do estabelecimento', 'O endereço completo', 'Um pouco da cultura do lugar'],
  };
  const NAME = 'Diego'; // contratante usaria outro nome; placeholder de protótipo

  function renderBullets(){
    const role = document.body.dataset.role;
    document.getElementById('bullets').innerHTML =
      BULLETS[role].map(b=>`<li>${b}</li>`).join('');
  }
  function setRole(role){
    document.body.dataset.role = role;
    document.getElementById('r-prof').classList.toggle('on', role==='profissional');
    document.getElementById('r-cont').classList.toggle('on', role==='contratante');
    renderBullets();
  }
  function setState(st){
    ['default','loading','error','active'].forEach(s=>
      document.getElementById('s-'+s).classList.toggle('on', s===st));
    const welcome = document.getElementById('welcome-block');
    const active  = document.getElementById('active-block');
    const err     = document.getElementById('banner-err');
    const spin    = document.getElementById('cta-spin');
    const label   = document.getElementById('cta-label');
    const cta      = document.getElementById('cta');
    const later   = document.getElementById('later');

    welcome.classList.toggle('hide', st==='active');
    active.classList.toggle('hide', st!=='active');
    err.classList.toggle('hide', st!=='error');
    spin.classList.toggle('hide', st!=='loading');
    label.classList.toggle('hide', st==='loading');
    cta.disabled = (st==='loading');
    later.disabled = (st==='loading');
  }
  function setView(v){
    document.getElementById('stage').className = 'stage '+v;
    document.getElementById('v-mobile').classList.toggle('on', v==='mobile');
    document.getElementById('v-desktop').classList.toggle('on', v==='desktop');
  }
  function toggleTheme(){
    const h=document.documentElement;
    h.dataset.theme = h.dataset.theme==='dark' ? 'light' : 'dark';
  }
  renderBullets();
</script>
</body>
</html>
