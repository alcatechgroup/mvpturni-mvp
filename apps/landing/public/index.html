<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Turni</title>
  <meta name="description" content="Turni — em breve.">
  <meta name="theme-color" content="#00A868">

  <!-- Open Graph mínimo (preview de compartilhamento) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Turni">
  <meta property="og:description" content="Turni — em breve.">

  <!-- Fontes: mesmo padrão da landing AS IS (preconnect + preload do Bebas crítico + display=swap) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="font" type="font/woff2" crossorigin
        href="https://fonts.gstatic.com/s/bebasneue/v14/JTUSjIg69CK48gW7PXoo9Wlhyw.woff2">
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400&display=swap">

  <style>
    /* Tokens herdados da landing AS IS (docs/prototipo/index.html) — CA-3:
       mudança futura de palette reflete aqui sem refactor. */
    :root {
      --black: #000000;
      --logo-green: #00A868;
      --message: #FFFFFF;   /* 21:1 sobre preto */
      --footer: #8A8A82;    /* ~6.2:1 sobre preto — AA folgado */
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--black);
      display: flex;
      flex-direction: column;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Bloco marca + copy centralizado vertical e horizontalmente */
    .wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 3vh, 24px);
      padding: 0 16px;
      text-align: center;
    }

    /* Mark TURNI. — font-based (Bebas Neue), herdado da landing AS IS.
       É o <h1> semântico (único heading); aria-label="Turni" no container. */
    .logo {
      margin: 0;
      font-family: 'Bebas Neue', sans-serif;
      font-weight: 400;
      font-size: clamp(72px, 12vw, 120px);
      line-height: 1;
      letter-spacing: 2px;
      color: #FFFFFF;
    }
    .logo .di { color: var(--logo-green); }        /* o "I" — verde sólido */
    .logo .de { color: var(--logo-green); }         /* fallback: ponto verde sólido */
    @supports (-webkit-text-stroke: 1px) {          /* progressive enhancement: ponto vazado */
      .logo .de {
        -webkit-text-stroke: 3px var(--logo-green);
        color: transparent;
      }
    }

    .message {
      margin: 0;
      font-size: clamp(18px, 2.4vw, 24px);
      font-weight: 400;
      color: var(--message);
    }

    .footer {
      padding: 16px;
      padding-bottom: clamp(16px, 4vh, 24px);
      text-align: center;
      font-size: 13px;
      color: var(--footer);
    }
  </style>
</head>
<body data-screen="em-breve">
  <main class="wrap">
    <h1 class="logo" id="em-breve-logo" role="img" aria-label="Turni">TURN<span class="di" aria-hidden="true">I</span><span class="de" aria-hidden="true">.</span></h1>
    <p class="message" id="em-breve-message">Em breve.</p>
  </main>
  <footer class="footer" id="em-breve-footer">© Turni · 2026</footer>
</body>
</html>
