name: Release

# Único disparador de build de release + deploy (ADR-004 / quality-standards 2.2).
#   vX.Y.Z-rc.N → build + deploy automático em homologação (sem gate humano)
#   vX.Y.Z       → build + deploy em produção (gate humano via GitHub Environment "prod")
#
# Push/merge em main sem tag NÃO dispara este workflow (CA-6).
on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*-rc.[0-9]*"   # homolog: v0.1.0-rc.1
      - "v[0-9]*.[0-9]*.[0-9]*"              # prod: v0.1.0 (detect-env distingue em runtime)

permissions:
  contents: read
  id-token: write   # necessário para Workload Identity Federation

env:
  GCP_REGION: southamerica-east1
  REGISTRY: ${{ secrets.GCP_REGION != '' && secrets.GCP_REGION || 'southamerica-east1' }}-docker.pkg.dev

jobs:
  # ── Detecta o ambiente alvo a partir da tag ──────────────────────────────────
  detect-env:
    name: Detectar ambiente (homolog / prod)
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.detect.outputs.environment }}
      is_rc: ${{ steps.detect.outputs.is_rc }}
    steps:
      - id: detect
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ -rc\. ]]; then
            echo "environment=homolog" >> "$GITHUB_OUTPUT"
            echo "is_rc=true" >> "$GITHUB_OUTPUT"
          else
            echo "environment=prod" >> "$GITHUB_OUTPUT"
            echo "is_rc=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Build + push dos artefatos ───────────────────────────────────────────────
  build:
    name: Build & push ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: [detect-env]
    strategy:
      matrix:
        app: [api, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Autenticar no GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build + push imagem de release (${{ matrix.app }})
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/turni/${{ matrix.app }}"
          docker build \
            --file infra/docker/${{ matrix.app }}/Dockerfile.prod \
            --build-arg APP_VERSION=${{ github.ref_name }} \
            --tag "${IMAGE}:${{ github.ref_name }}" \
            --tag "${IMAGE}:latest" \
            --push \
            .

  # ── Build Flutter web ────────────────────────────────────────────────────────
  build-webapp:
    name: Build Flutter web
    runs-on: ubuntu-latest
    needs: [detect-env]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          cache: true
      - name: Get dependencies
        working-directory: apps/webapp
        run: flutter pub get
      - name: Gerar version.json e health.json
        run: |
          echo '{"version":"${{ github.ref_name }}"}' > apps/webapp/web/version.json
          echo '{"status":"ok","version":"${{ github.ref_name }}","timestamp":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'","service":"webapp"}' > apps/webapp/web/health.json
      - name: Build web (release)
        working-directory: apps/webapp
        run: |
          # API_BASE_URL vazio = mesma origem: o WebApp chama /api e /sanctum no
          # próprio domínio e o Firebase Hosting faz rewrite p/ o Cloud Run da api
          # (firebase.json). Resolve o cookie cross-domain do Sanctum SPA. STORY-016.
          flutter build web \
            --dart-define=APP_VERSION=${{ github.ref_name }} \
            --dart-define=API_BASE_URL= \
            --no-tree-shake-icons \
            --release
      - name: Upload artefato web
        uses: actions/upload-artifact@v4
        with:
          name: webapp-web-${{ github.ref_name }}
          path: apps/webapp/build/web/
          retention-days: 30

  # ── Migração + seed do banco de homologação (Cloud Run Job) ──────────────────
  # A imagem da api roda `php artisan migrate --force && db:seed --force` contra o
  # Cloud SQL, ANTES dos deploys fliparem o tráfego (schema pronto p/ o código novo).
  # Só homolog (is_rc): o seed cria os usuários de teste do CA-12 e NÃO vai p/ prod.
  # (Prod terá seu próprio job migrate-only quando o deploy de produção for usado.)
  migrate-homolog:
    name: Migrar + seed (homolog)
    runs-on: ubuntu-latest
    needs: [build, detect-env]
    if: needs.detect-env.outputs.is_rc == 'true'
    timeout-minutes: 15
    steps:
      - name: Autenticar no GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Garantir Cloud SQL ligado
        run: |
          # O scheduler de economia pode estar com a instância desligada (noite/fim
          # de semana). Migração exige o banco no ar; liga e aguarda RUNNABLE.
          STATE=$(gcloud sql instances describe turni-homolog \
            --project=${{ secrets.GCP_PROJECT_ID }} --format="value(state)")
          echo "estado atual: $STATE"
          if [ "$STATE" != "RUNNABLE" ]; then
            gcloud sql instances patch turni-homolog \
              --project=${{ secrets.GCP_PROJECT_ID }} --activation-policy=ALWAYS --quiet
            for i in $(seq 1 30); do
              ST=$(gcloud sql instances describe turni-homolog \
                --project=${{ secrets.GCP_PROJECT_ID }} --format="value(state)")
              [ "$ST" = "RUNNABLE" ] && { echo "RUNNABLE"; break; }
              echo "aguardando RUNNABLE ($i/30) — $ST"; sleep 10
            done
          fi

      - name: Deploy + executa job de migração (migrate + seed)
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/turni/api:${{ github.ref_name }}"
          CONN="${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:turni-homolog"
          gcloud run jobs deploy turni-migrate-homolog \
            --image="$IMAGE" \
            --region=${{ env.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --service-account=turni-apps@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-cloudsql-instances="$CONN" \
            --network=turni-homolog --subnet=turni-homolog-${{ env.GCP_REGION }} \
            --vpc-egress=private-ranges-only \
            --set-env-vars="APP_ENV=production,APP_DEBUG=false,LOG_CHANNEL=stderr,DB_CONNECTION=pgsql,DB_SOCKET=/cloudsql/${CONN},DB_DATABASE=turni,DB_USERNAME=turni,QUEUE_CONNECTION=database,SESSION_DRIVER=array" \
            --set-secrets="APP_KEY=turni-homolog-app-key-api:latest,DB_PASSWORD=turni-homolog-db-password:latest" \
            --command=sh \
            --args='-c,php artisan migrate --force && php artisan db:seed --force' \
            --max-retries=0 --task-timeout=300
          gcloud run jobs execute turni-migrate-homolog \
            --region=${{ env.GCP_REGION }} --project=${{ secrets.GCP_PROJECT_ID }} --wait

      - name: Atualizar imagem do worker job (Cloud Run Job — IDR-016)
        run: |
          # O Terraform é dono da DEFINIÇÃO do worker job (env, secrets, VPC, Cloud SQL —
          # módulo worker-job, ignore_changes=[image]); o pipeline só atualiza a imagem
          # a cada release, igual ao api/admin. O Cloud Scheduler dispara o job a cada
          # 1 min (queue:work --stop-when-empty). O worker roda a MESMA imagem da api.
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/turni/api:${{ github.ref_name }}"
          gcloud run jobs update turni-worker-job-homolog \
            --image="$IMAGE" \
            --region=${{ env.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }}

  # ── Deploy API em homologação ────────────────────────────────────────────────
  deploy-api-homolog:
    name: Deploy API → homolog
    runs-on: ubuntu-latest
    needs: [build, detect-env, migrate-homolog]
    if: needs.detect-env.outputs.is_rc == 'true'
    environment:
      name: homolog
      url: https://api.homolog.turni.com.br/health
    steps:
      - uses: actions/checkout@v4
      - name: Autenticar no GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy Cloud Run — api (homolog)
        run: |
          gcloud run deploy turni-api-homolog \
            --image "${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/turni/api:${{ github.ref_name }}" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --tag "v-$(echo ${{ github.ref_name }} | tr '.' '-' | tr '+' '-')" \
            --no-traffic \
            --quiet
          gcloud run services update-traffic turni-api-homolog \
            --to-latest \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}
      - name: Health check
        run: |
          # Tenta domínio customizado; fallback para URL do Cloud Run enquanto DNS não está propagado
          URL=$(gcloud run services describe turni-api-homolog \
            --region=${{ env.GCP_REGION }} --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)" 2>/dev/null)
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health")
            if [ "$STATUS" = "200" ]; then echo "Health check ok: ${URL}/health"; exit 0; fi
            echo "Aguardando... ($i/12) status=$STATUS"
            sleep 10
          done
          echo "Health check falhou após 120s" && exit 1

  # ── Deploy Admin em homologação ──────────────────────────────────────────────
  deploy-admin-homolog:
    name: Deploy Admin → homolog
    runs-on: ubuntu-latest
    needs: [build, detect-env, migrate-homolog]
    if: needs.detect-env.outputs.is_rc == 'true'
    environment:
      name: homolog
      url: https://admin.homolog.turni.com.br/health
    steps:
      - uses: actions/checkout@v4
      - name: Autenticar no GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy Cloud Run — admin (homolog)
        run: |
          # IDR-003: homolog usa ingress=all para E2E no CI.
          # Binding allUsers → roles/run.invoker é gerenciado por Terraform (infra/modules/cloud-run). Aqui só fazemos deploy da imagem.
          # Prod continua com INGRESS_TRAFFIC_INTERNAL_LOAD_BALANCER + IAP.
          gcloud run deploy turni-admin-homolog \
            --image "${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/turni/admin:${{ github.ref_name }}" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --ingress=all \
            --tag "v-$(echo ${{ github.ref_name }} | tr '.' '-' | tr '+' '-')" \
            --no-traffic \
            --quiet
          gcloud run services update-traffic turni-admin-homolog \
            --to-latest \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}
      - name: Health check admin
        run: |
          ADMIN_URL=$(gcloud run services describe turni-admin-homolog \
            --region=${{ env.GCP_REGION }} --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)" 2>/dev/null)
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${ADMIN_URL}/health")
            if [ "$STATUS" = "200" ]; then echo "Admin health check ok: ${ADMIN_URL}/health"; exit 0; fi
            echo "Aguardando... ($i/12) status=$STATUS"
            sleep 10
          done
          echo "Health check falhou após 120s" && exit 1

  # ── Deploy WebApp (Firebase Hosting) em homologação ─────────────────────────
  deploy-webapp-homolog:
    name: Deploy WebApp → homolog (Firebase)
    runs-on: ubuntu-latest
    needs: [build-webapp, detect-env]
    if: needs.detect-env.outputs.is_rc == 'true'
    environment:
      name: homolog
      url: https://app.homolog.turni.com.br
    steps:
      - uses: actions/checkout@v4
      - name: Autenticar no GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Download artefato web
        uses: actions/download-artifact@v4
        with:
          name: webapp-web-${{ github.ref_name }}
          path: apps/webapp/build/web/
      - name: Deploy Firebase Hosting (homolog)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          target: homolog
          channelId: live

  # ── Smoke pós-deploy em homologação (curl /health + /version.json) ──────────
  # Substitui o antigo job e2e-homolog. E2E em browser real é gate LOCAL
  # (pre-push / `make e2e`) — ver IDR-004 e quality-standards.md §2.2.
  # Aqui só verificamos que as 3 interfaces respondem 200 e estão servindo a
  # versão da tag recém-deployada (catch rápido de deploy parcial / cache stale).
  smoke-homolog:
    name: Smoke pós-deploy (homolog)
    runs-on: ubuntu-latest
    needs: [deploy-api-homolog, deploy-admin-homolog, deploy-webapp-homolog, detect-env]
    if: needs.detect-env.outputs.is_rc == 'true'
    timeout-minutes: 5
    steps:
      - name: Autenticar no GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Obter URLs Cloud Run
        id: urls
        run: |
          API_URL=$(gcloud run services describe turni-api-homolog \
            --region=${{ env.GCP_REGION }} --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)")
          ADMIN_URL=$(gcloud run services describe turni-admin-homolog \
            --region=${{ env.GCP_REGION }} --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)")
          echo "api=${API_URL}"     >> "$GITHUB_OUTPUT"
          echo "admin=${ADMIN_URL}" >> "$GITHUB_OUTPUT"
          echo "webapp=https://app.homolog.turni.com.br" >> "$GITHUB_OUTPUT"

      - name: Smoke — /health (3 interfaces)
        run: |
          set -euo pipefail
          fail=0
          probe() {
            local name=$1 url=$2
            STATUS=$(curl -fsS -o /tmp/body -w "%{http_code}" "$url" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ $name → 200"
            else
              echo "✗ $name → $STATUS"
              echo "── body:"; cat /tmp/body || true; echo
              fail=1
            fi
          }
          probe "API    /health"  "${{ steps.urls.outputs.api }}/health"
          probe "Admin  /health"  "${{ steps.urls.outputs.admin }}/health"
          probe "WebApp /health.json" "${{ steps.urls.outputs.webapp }}/health.json"
          exit $fail

      - name: Smoke — /version.json bate com a tag
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          fail=0
          check_version() {
            local name=$1 url=$2
            BODY=$(curl -fsS "$url" || echo "")
            GOT=$(echo "$BODY" | grep -oE '"version":"[^"]+"' | head -1 | cut -d'"' -f4)
            if [ "$GOT" = "$TAG" ]; then
              echo "✓ $name version=$GOT"
            else
              echo "✗ $name esperava version=$TAG, recebeu '$GOT' (body: $BODY)"
              fail=1
            fi
          }
          check_version "API"    "${{ steps.urls.outputs.api }}/version.json"
          check_version "Admin"  "${{ steps.urls.outputs.admin }}/version.json"
          check_version "WebApp" "${{ steps.urls.outputs.webapp }}/version.json"
          exit $fail

      # STORY-017: foto de celular (~1.3 MB) era barrada com 413 no nginx (default 1 MB).
      # Garante que o edge (nginx client_max_body_size + PHP upload_max_filesize) aceita
      # upload realista. Payload incompleto de propósito → 422 de validação, sem criar
      # usuário. O que NÃO pode acontecer é 413.
      - name: Smoke — upload >1MB não é barrado no edge (regressão 413)
        run: |
          set -euo pipefail
          head -c 1300000 /dev/urandom > /tmp/foto_smoke.jpg
          STATUS=$(curl -s -o /tmp/up_body -w "%{http_code}" \
            -F "foto=@/tmp/foto_smoke.jpg;type=image/jpeg" \
            -F "name=smoke" -F "email=smoke@invalid.test" \
            "${{ steps.urls.outputs.api }}/api/cadastro/profissional" || echo "000")
          if [ "$STATUS" = "413" ]; then
            echo "✗ upload de 1.3MB barrado com 413 (limites de corpo baixos)"; cat /tmp/up_body || true; exit 1
          fi
          echo "✓ upload >1MB aceito no edge (HTTP $STATUS — 4xx de validação esperado, não 413)"

  # ── Gate humano + deploy em PRODUÇÃO ────────────────────────────────────────
  deploy-prod:
    name: Deploy → PRODUÇÃO (gate humano obrigatório)
    runs-on: ubuntu-latest
    needs: [build, build-webapp, detect-env]
    if: needs.detect-env.outputs.is_rc == 'false'
    # GitHub Environment "prod" tem revisor obrigatório — 1 clique humano.
    # Artefatos são reutilizados do build desta tag; NÃO são reconstruídos.
    environment:
      name: prod
      url: https://app.turni.com.br
    steps:
      - uses: actions/checkout@v4
      - name: Autenticar no GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy Cloud Run — api (prod)
        run: |
          gcloud run deploy turni-api-prod \
            --image "${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/turni/api:${{ github.ref_name }}" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --no-traffic --quiet
          gcloud run services update-traffic turni-api-prod \
            --to-latest \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}
      - name: Deploy Cloud Run — admin (prod)
        run: |
          gcloud run deploy turni-admin-prod \
            --image "${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/turni/admin:${{ github.ref_name }}" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --no-traffic --quiet
          gcloud run services update-traffic turni-admin-prod \
            --to-latest \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}
      - name: Download artefato web
        uses: actions/download-artifact@v4
        with:
          name: webapp-web-${{ github.ref_name }}
          path: apps/webapp/build/web/
      - name: Deploy Firebase Hosting (prod)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          target: prod
          channelId: live
