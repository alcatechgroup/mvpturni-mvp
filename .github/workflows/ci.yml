name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags-ignore:
      - "**"   # tags disparam o workflow release.yml, não este

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Commit message lint ────────────────────────────────────────────────────
  commitlint:
    name: Commit lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      - name: Install commitlint
        run: npm ci --prefix .github/commitlint
      - name: Lint commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx --prefix .github/commitlint commitlint \
              --config .github/commitlint/commitlint.config.js \
              --from "${{ github.event.pull_request.base.sha }}" \
              --to "${{ github.event.pull_request.head.sha }}"
          else
            npx --prefix .github/commitlint commitlint \
              --config .github/commitlint/commitlint.config.js \
              --from HEAD~1 --to HEAD
          fi

  # ── Secret detection ────────────────────────────────────────────────────────
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --log-opts "HEAD^..HEAD" --verbose

  # ── PHP — lint + vuln scan ──────────────────────────────────────────────────
  php-lint:
    name: PHP lint & audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, admin]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: apps/${{ matrix.app }}/vendor
          key: composer-${{ matrix.app }}-${{ hashFiles('apps/${{ matrix.app }}/composer.lock') }}
          restore-keys: composer-${{ matrix.app }}-
      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: composer install --no-interaction --prefer-dist --no-scripts
      - name: Lint (Pint — check mode)
        working-directory: apps/${{ matrix.app }}
        run: ./vendor/bin/pint --test
      - name: Dependency vulnerability audit
        working-directory: apps/${{ matrix.app }}
        run: composer audit

  # ── Flutter — lint + analyze ────────────────────────────────────────────────
  flutter-lint:
    name: Flutter lint & analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          cache: true
      - name: Get dependencies
        working-directory: apps/webapp
        run: flutter pub get
      - name: Format check
        working-directory: apps/webapp
        run: dart format --output none --set-exit-if-changed lib/
      - name: Analyze
        working-directory: apps/webapp
        run: flutter analyze --no-fatal-infos

  # ── Smoke build — PHP containers ────────────────────────────────────────────
  smoke-build-php:
    name: Smoke build (${{ matrix.app }} image)
    runs-on: ubuntu-latest
    needs: [php-lint]
    strategy:
      matrix:
        app: [api, admin]
    steps:
      - uses: actions/checkout@v4
      - name: Build production image (smoke — não publicada)
        run: |
          docker build \
            --file infra/docker/${{ matrix.app }}/Dockerfile.prod \
            --build-arg APP_VERSION=smoke-${{ github.sha }} \
            --tag turni/${{ matrix.app }}:smoke \
            .

  # ── Smoke build — Flutter web ────────────────────────────────────────────────
  smoke-build-flutter:
    name: Smoke build (Flutter web)
    runs-on: ubuntu-latest
    needs: [flutter-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          cache: true
      - name: Get dependencies
        working-directory: apps/webapp
        run: flutter pub get
      - name: Build web (smoke)
        working-directory: apps/webapp
        run: |
          flutter build web \
            --dart-define=APP_VERSION=smoke-${{ github.sha }} \
            --no-tree-shake-icons

  # ── Container image scan ─────────────────────────────────────────────────────
  trivy-scan:
    name: Container scan (Trivy — ${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [smoke-build-php]
    strategy:
      matrix:
        app: [api, admin]
    steps:
      - uses: actions/checkout@v4
      - name: Build image para scan
        run: |
          docker build \
            --file infra/docker/${{ matrix.app }}/Dockerfile.prod \
            --build-arg APP_VERSION=scan-${{ github.sha }} \
            --tag turni/${{ matrix.app }}:scan \
            .
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: turni/${{ matrix.app }}:scan
          format: "sarif"
          output: trivy-${{ matrix.app }}.sarif
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.app }}.sarif
